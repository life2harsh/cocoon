<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cocoon</title>
    <meta name="theme-color" content="#04070d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="description"
      content="Reflective spaces, gentle rituals, and shared journals built for calmer days."
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      (function () {
        var key = "cocoon-theme";
        var stored = window.localStorage.getItem(key);
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var mode = prefersDark ? "dark" : "light";
        var appearance = "morning";

        if (stored) {
          try {
            var parsed = JSON.parse(stored);
            if (parsed && (parsed.mode === "light" || parsed.mode === "dark")) {
              mode = parsed.mode;
            }
            if (parsed && (parsed.appearance === "morning" || parsed.appearance === "sage" || parsed.appearance === "lavender" || parsed.appearance === "peach")) {
              appearance = parsed.appearance;
            }
          } catch (error) {
            if (stored === "light" || stored === "dark") {
              mode = stored;
            } else if (stored === "sage" || stored === "lavender" || stored === "peach") {
              appearance = stored;
            }
          }
        }

        document.documentElement.setAttribute("data-theme", mode);
        if (appearance !== "morning") {
          document.documentElement.setAttribute("data-appearance", appearance);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
